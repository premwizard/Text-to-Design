services:
  - type: web
    name: text-to-design-backend
    env: python
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: fastapi run backend/app/main.py --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.10.12
