<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TextToDesign Sandbox</title>
    <!-- Preview Debugger & Global Error Catching -->
    <script>
      console.log("[PREVIEW DEBUG] Initializing preview...");
      
      const _log = console.log;
      const _error = console.error;
      const _warn = console.warn;
      
      function forwardLog(type, args) {
        const msg = Array.from(args).map(arg => {
          if (typeof arg === 'object') {
            try { return JSON.stringify(arg); } catch(e) { return String(arg); }
          }
          return String(arg);
        }).join(' ');
        
        if (window.parent) {
          window.parent.postMessage({
            type: 'preview_console',
            logType: type,
            message: msg
          }, '*');
        }
      }
      
      console.log = function() {
        _log.apply(console, arguments);
        forwardLog('log', arguments);
      };
      console.error = function() {
        _error.apply(console, arguments);
        forwardLog('error', arguments);
      };
      console.warn = function() {
        _warn.apply(console, arguments);
        forwardLog('warn', arguments);
      };

      window.addEventListener('error', (event) => {
        _error("[PREVIEW DEBUG] Script error caught:", event.message);
        if (window.parent) {
          window.parent.postMessage({
            type: 'runtime_error',
            error: event.message,
            stack: event.error ? event.error.stack : ''
          }, '*');
        }
      });

      window.addEventListener('DOMContentLoaded', () => {
        const root = document.getElementById('root');
        const observer = new MutationObserver((mutations) => {
          if (root && root.children.length > 0) {
            _log("[PREVIEW DEBUG] React application rendered to DOM successfully.");
            if (window.parent) {
              window.parent.postMessage({
                type: 'preview_rendered',
                html: root.innerHTML.slice(0, 1000)
              }, '*');
            }
            observer.disconnect();
          }
        });
        if (root) {
          observer.observe(root, { childList: true, subtree: true });
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/preview/assets/index.js"></script>
  </body>
</html>
